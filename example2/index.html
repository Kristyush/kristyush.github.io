<!DOCTYPE html>
<html>
<head>
	<title>Пример работы AR</title>
</head>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@v6.1.1/dist/aframe-extras.js"></script>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs='sourceType: webcam;'>
	<a-marker-camera type='pattern' url='pattern-qr-code.patt'>
		<!-- <a-box position='0 0.5 0' material='color: green;'></a-box> -->
		<a-entity gltf-model="url(https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Fox/glTF/Fox.gltf)" scale="0.5 0.5 0.5"  animation-mixer></a-entity>
    </a-marker-camera>
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
